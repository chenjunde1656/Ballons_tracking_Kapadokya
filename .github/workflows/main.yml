name: Cappadocia Flight Monitor

on:
  schedule:
    # 這裡使用 UTC 時間設定 (GitHub Actions 強制使用 UTC)
    # 卡帕多奇亞 UTC+3，所以我們要監測 UTC 00:00 - 08:00
    # 也就是台灣時間 08:00 - 16:00
    - cron: '*/5 0-8 * * *'  
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add flight_events.log
          git commit -m "Update flight status [skip ci]" || exit 0
          git push
