name: Cappadocia Flight Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分鐘跑一次
  workflow_dispatch:        # 允許手動點擊執行

# 加入環境變數，提早選入 Node.js 24 模式
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add flight_events.log
          git commit -m "Update flight status [skip ci]" || exit 0
          git push
